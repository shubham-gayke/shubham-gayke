<svg viewBox="0 0 1200 950" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Shubham Gayke — DevOps Engineer &amp; System Boot">
  <defs>
    <!-- Combined Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040910"/>
      <stop offset="35%" stop-color="#071627"/>
      <stop offset="70%" stop-color="#05101a"/>
      <stop offset="100%" stop-color="#020408"/>
    </linearGradient>

    <!-- Aurora Effects -->
    <radialGradient id="auroraBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5EEAD4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#5EEAD4" stop-opacity="0"/>
    </radialGradient>

    <!-- HUD Gradients -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5EEAD4" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#22D3EE" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#040910" stop-opacity="0"/>
    </radialGradient>

    <!-- Text & Glow Gradients -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#BAE6FD"/>
      <stop offset="45%" stop-color="#38BDF8"/>
      <stop offset="75%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#5EEAD4"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.4 0; 0.4 0; -0.4 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7DD3FC" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="borderGrad" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#7DD3FC" stop-opacity="0"/>
      <stop offset="45%" stop-color="#7DD3FC" stop-opacity="0.7"/>
      <stop offset="55%" stop-color="#5EEAD4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#5EEAD4" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="rotate" values="0 600 475; 360 600 475" dur="15s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="shardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7DD3FC" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5EEAD4" stop-opacity="0.03"/>
    </linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softblur"><feGaussianBlur stdDeviation="25"/></filter>
    <filter id="shardblur"><feGaussianBlur stdDeviation="0.6"/></filter>
    
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.55  0 0 0 0 0.82  0 0 0 0 0.95  0 0 0 0.05 0"/>
    </filter>

    <!-- Path for data packets -->
    <path id="leftDataPath" d="M -220,0 L -380,0 L -430,-50 L -430,-150"/>
    <path id="rightDataPath" d="M 220,0 L 380,0 L 430,50 L 430,150"/>
    <path id="bottomDataPath" d="M 0,220 L 0,320 L -150,320"/>

    <style>
      .t-main { font-family: 'Segoe UI', Roboto, sans-serif; }
      .t-mono { font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace; }
      .hud-text { font-size: 11px; fill: #7C93A8; letter-spacing: 1.5px; }
      .hud-val { fill: #38BDF8; font-weight: bold; }
      .hex { fill: none; stroke: #22D3EE; stroke-width: 1; opacity: 0.2; }
    </style>
  </defs>

  <rect width="1200" height="950" fill="url(#bg)" rx="28"/>

  <!-- Ambient aurora drift -->
  <circle cx="220" cy="150" r="280" fill="url(#auroraBlue)" filter="url(#softblur)">
    <animate attributeName="cx" values="220;380;220" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="150;250;150" dur="22s" repeatCount="indefinite"/>
  </circle>
  <circle cx="950" cy="400" r="300" fill="url(#auroraCyan)" filter="url(#softblur)">
    <animate attributeName="cx" values="950;750;950" dur="20s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="400;500;400" dur="16s" repeatCount="indefinite"/>
  </circle>

  <!-- grain texture -->
  <rect x="0" y="0" width="1200" height="950" filter="url(#grain)" opacity="0.05" rx="28"/>

  <!-- ═════════════════ HERO SECTION (TOP 380px) ═════════════════ -->
  
  <!-- slowly rotating ice shards -->
  <g transform="translate(900,180)">
    <polygon points="0,-140 120,-40 90,110 -60,130 -140,10" fill="url(#shardGrad)" stroke="#7DD3FC" stroke-opacity="0.22" stroke-width="1" filter="url(#shardblur)">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="90s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <g transform="translate(1080,300)">
    <polygon points="0,-70 65,-10 40,70 -55,55" fill="url(#shardGrad)" stroke="#5EEAD4" stroke-opacity="0.2" stroke-width="1" filter="url(#shardblur)">
      <animateTransform attributeName="transform" type="rotate" values="360;0" dur="70s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- moving scanline -->
  <rect x="0" y="-6" width="1200" height="4" fill="url(#scanGrad)">
    <animate attributeName="y" values="-10;960" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- status pill -->
  <rect x="50" y="44" width="186" height="36" rx="18" fill="#7DD3FC" fill-opacity="0.07" stroke="#7DD3FC" stroke-opacity="0.35"/>
  <circle cx="72" cy="62" r="5" fill="#22D3EE">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <text x="90" y="67" class="t-mono" font-size="13" letter-spacing="1.5" fill="#BFEFFF">SYSTEM ONLINE</text>

  <!-- watermark -->
  <text x="1150" y="54" text-anchor="end" class="t-mono" font-size="12" fill="#7C93A8" opacity="0.4">GLACIER.OS</text>

  <!-- greeting -->
  <text x="52" y="142" class="t-main" font-size="24" fill="#8FB4CC">Hi, I'm</text>

  <!-- name -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0" dur="6s" repeatCount="indefinite"/>
    <text x="50" y="216" class="t-main" font-size="70" font-weight="900" letter-spacing="1" fill="url(#nameGrad)" filter="url(#glow)">SHUBHAM GAYKE</text>
  </g>

  <!-- typed role cycle -->
  <g class="t-mono" font-size="25" fill="#D7F3FF">
    <text x="52" y="276" opacity="0">
      DevOps Engineer<tspan fill="#22D3EE">▌</tspan>
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.25;0.2501;1" dur="12s" begin="0s" repeatCount="indefinite"/>
    </text>
    <text x="52" y="276" opacity="0">
      Cloud Architect<tspan fill="#22D3EE">▌</tspan>
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.25;0.2501;1" dur="12s" begin="3s" repeatCount="indefinite"/>
    </text>
    <text x="52" y="276" opacity="0">
      AI Automation Specialist<tspan fill="#22D3EE">▌</tspan>
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.25;0.2501;1" dur="12s" begin="6s" repeatCount="indefinite"/>
    </text>
    <text x="52" y="276" opacity="0">
      Builder of Self-Healing Systems<tspan fill="#22D3EE">▌</tspan>
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.25;0.2501;1" dur="12s" begin="9s" repeatCount="indefinite"/>
    </text>
  </g>

  <text x="52" y="342" class="t-mono" font-size="15" fill="#7C93A8">
    // infrastructure should be invisible, resilient, self-healing
    <animate attributeName="opacity" values="0.55;1;0.55" dur="5s" repeatCount="indefinite"/>
  </text>
  <text x="52" y="372" class="t-mono" font-size="14" fill="#5E7A90">📍 India &#160;&#160;·&#160;&#160; ✉ shubhamgayke9860@gmail.com</text>

  <!-- ═════════════════ NEURAL CORE HUD (BOTTOM SECTION) ═════════════════ -->
  
  <line x1="50" y1="440" x2="1150" y2="440" stroke="url(#nameGrad)" stroke-width="1.5" opacity="0.15"/>
  <circle cx="600" cy="440" r="4" fill="#38BDF8" filter="url(#glow)"/>

  <g transform="translate(600, 680)">
    
    <!-- Central ambient core glow -->
    <circle cx="0" cy="0" r="280" fill="url(#coreGlow)">
      <animate attributeName="r" values="280;300;280" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
    </circle>

    <!-- Outer tech ring (dashed, rotating slow) -->
    <circle r="230" fill="none" stroke="#22D3EE" stroke-width="1" stroke-dasharray="4 12" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="40s" repeatCount="indefinite"/>
    </circle>

    <!-- Mid tech ring (rotating fast opposite) -->
    <circle r="180" fill="none" stroke="#38BDF8" stroke-width="2" stroke-dasharray="80 40 10 20" opacity="0.5" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" values="360;0" dur="25s" repeatCount="indefinite"/>
    </circle>

    <!-- Inner pulsing ring -->
    <circle r="130" fill="none" stroke="#5EEAD4" stroke-width="3" stroke-dasharray="150 50" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="15s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Core Engine -->
    <circle r="80" fill="none" stroke="#BAE6FD" stroke-width="1" opacity="0.4"/>
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" fill="none" stroke="#38BDF8" stroke-width="2" filter="url(#glow)">
       <animateTransform attributeName="transform" type="rotate" values="0;360" dur="10s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="0,-45 39,-22.5 39,22.5 0,45 -39,22.5 -39,-22.5" fill="none" stroke="#5EEAD4" stroke-width="1.5">
       <animateTransform attributeName="transform" type="rotate" values="360;0" dur="8s" repeatCount="indefinite"/>
    </polygon>
    
    <!-- Beating Heart / Data node -->
    <circle r="20" fill="#BAE6FD" filter="url(#glow)">
       <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite"/>
       <animate attributeName="r" values="18;24;18" dur="1.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Data streams pipelines -->
    <use href="#leftDataPath" fill="none" stroke="#22D3EE" stroke-width="1" stroke-dasharray="2 4" opacity="0.4"/>
    <use href="#rightDataPath" fill="none" stroke="#5EEAD4" stroke-width="1" stroke-dasharray="2 4" opacity="0.4"/>
    <use href="#bottomDataPath" fill="none" stroke="#38BDF8" stroke-width="1" stroke-dasharray="2 4" opacity="0.4"/>

    <!-- Moving glowing data packets -->
    <circle r="4" fill="#BAE6FD" filter="url(#glow)">
       <animateMotion href="#leftDataPath" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#22D3EE" filter="url(#glow)">
       <animateMotion href="#leftDataPath" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    
    <circle r="4" fill="#BAE6FD" filter="url(#glow)">
       <animateMotion href="#rightDataPath" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#5EEAD4" filter="url(#glow)">
       <animateMotion href="#rightDataPath" dur="4s" begin="2s" repeatCount="indefinite"/>
    </circle>

    <circle r="4" fill="#BAE6FD" filter="url(#glow)">
       <animateMotion href="#bottomDataPath" dur="2.5s" repeatCount="indefinite"/>
    </circle>

  </g>

  <!-- HUD METRICS PANELS -->
  <g transform="translate(70, 520)" class="t-mono hud-text">
    <rect width="240" height="130" fill="#04101c" fill-opacity="0.5" stroke="#22D3EE" stroke-opacity="0.3" rx="8"/>
    <text x="20" y="30">SYSTEM.KERNEL : <tspan class="hud-val" fill="#22c55e">ONLINE</tspan></text>
    <text x="20" y="55">NODE.UPTIME   : <tspan class="hud-val">99.99%</tspan></text>
    <text x="20" y="80">INFRASTRUCTURE: <tspan class="hud-val">SCALING</tspan></text>
    <text x="20" y="105">AI.AGENTS     : <tspan class="hud-val">DEPLOYED</tspan></text>
  </g>

  <g transform="translate(70, 680)" class="t-mono hud-text">
    <rect width="240" height="130" fill="#04101c" fill-opacity="0.5" stroke="#38BDF8" stroke-opacity="0.3" rx="8"/>
    <text x="20" y="30">CPU LOAD</text>
    <rect x="20" y="40" width="180" height="6" fill="#04101c" stroke="#38BDF8" stroke-width="1"/>
    <rect x="20" y="40" width="120" height="6" fill="#38BDF8" filter="url(#glow)">
      <animate attributeName="width" values="100;160;120;140;100" dur="5s" repeatCount="indefinite"/>
    </rect>

    <text x="20" y="75">MEMORY FLUX</text>
    <rect x="20" y="85" width="180" height="6" fill="#04101c" stroke="#5EEAD4" stroke-width="1"/>
    <rect x="20" y="85" width="80" height="6" fill="#5EEAD4" filter="url(#glow)">
      <animate attributeName="width" values="60;110;80;90;60" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g transform="translate(890, 520)" class="t-mono hud-text">
    <rect width="240" height="130" fill="#04101c" fill-opacity="0.5" stroke="#5EEAD4" stroke-opacity="0.3" rx="8"/>
    <text x="20" y="30">SECURITY.LAKE : <tspan class="hud-val" fill="#22c55e">SECURE</tspan></text>
    <text x="20" y="55">THROUGHPUT    : <tspan class="hud-val">98.4 TB/s</tspan></text>
    <text x="20" y="80">LATENCY       : <tspan class="hud-val">1.2ms</tspan></text>
    <text x="20" y="105">PIPELINE.SYNC : <tspan class="hud-val">VERIFIED</tspan></text>
  </g>

  <!-- Hexagon grid decorative elements on right -->
  <g transform="translate(930, 720)">
    <!-- A small grid of hexagons -->
    <path class="hex" d="M 0,-15 L 13,-7.5 L 13,7.5 L 0,15 L -13,7.5 L -13,-7.5 Z">
      <animate attributeName="fill" values="#040910;#22D3EE;#040910" dur="3s" repeatCount="indefinite"/>
    </path>
    <path class="hex" d="M 30,-15 L 43,-7.5 L 43,7.5 L 30,15 L 17,7.5 L 17,-7.5 Z">
      <animate attributeName="fill" values="#040910;#5EEAD4;#040910" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </path>
    <path class="hex" d="M 15,-40 L 28,-32.5 L 28,-17.5 L 15,-10 L 2,-17.5 L 2,-32.5 Z">
      <animate attributeName="fill" values="#040910;#38BDF8;#040910" dur="3s" begin="1s" repeatCount="indefinite"/>
    </path>
    <path class="hex" d="M -15,-40 L -2,-32.5 L -2,-17.5 L -15,-10 L -28,-17.5 L -28,-32.5 Z"/>
    <path class="hex" d="M 15,10 L 28,17.5 L 28,32.5 L 15,40 L 2,32.5 L 2,17.5 Z"/>
    <path class="hex" d="M -30,-15 L -17,-7.5 L -17,7.5 L -30,15 L -43,7.5 L -43,-7.5 Z">
      <animate attributeName="fill" values="#040910;#22D3EE;#040910" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- shimmering frame border -->
  <rect x="1" y="1" width="1198" height="948" rx="27" fill="none" stroke="url(#borderGrad)" stroke-width="2"/>
  <rect x="1" y="1" width="1198" height="948" rx="27" fill="none" stroke="#7DD3FC" stroke-opacity="0.15" stroke-width="1.5"/>
</svg>

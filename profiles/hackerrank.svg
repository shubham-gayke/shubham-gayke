<svg viewBox="0 0 340 130" xmlns="http://www.w3.org/2000/svg" role="img">
  <defs>
    <filter id="softGlow"><feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="logoGlow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="hexGrid" width="40" height="69.282" patternUnits="userSpaceOnUse" patternTransform="scale(0.8)">
      <path d="M 40 17.321 L 20 5.774 L 0 17.321 L 0 40.415 L 20 51.962 L 40 40.415 Z M 40 51.962 L 20 63.509 L 0 51.962 M 20 5.774 L 20 -5.774 M 20 75.056 L 20 63.509 M 40 17.321 L 60 5.774 M 0 17.321 L -20 5.774 M 40 40.415 L 60 51.962 M 0 40.415 L -20 51.962" stroke="#5eead4" stroke-opacity="0.04" stroke-width="1.5" fill="none"/>
    </pattern>
    <clipPath id="cardClip">
      <rect width="340" height="130" rx="12"/>
    </clipPath>
  </defs>

  <style>
    .mono { font-family: 'JetBrains Mono', Consolas, 'Fira Code', monospace; }
    .card-bg { fill: #040910; stroke: #5eead4; stroke-width: 1.5; rx: 12; transition: all 0.3s ease; }
    .card-title { font-family: 'Segoe UI', sans-serif; font-weight: 700; font-size: 15px; fill: #ffffff; letter-spacing: 0.5px; }
    .logo-path { fill: #5eead4; filter: url(#logoGlow); }
    
    .hover-target { cursor: pointer; outline: none; }
    .hover-target:hover .card-bg { fill: #0a1322; stroke-width: 2.5; filter: url(#softGlow); }
    
    .scanner { opacity: 0.5; }
  </style>
  
  <rect width="340" height="130" rx="12" fill="url(#hexGrid)"/>
  
  <g class="hover-target">
    <rect width="340" height="130" class="card-bg"/>
    
    <!-- Logo -->
    <g transform="translate(25, 25) scale(1.5)">
      <path class="logo-path" d="M0 0v24h24V0zm9.95 8.002h1.805c.061 0 .111.05.111.111v7.767c0 .061-.05.111-.11.111H9.95c-.061 0-.111-.05-.111-.11v-2.87H7.894v2.87c0 .06-.05.11-.11.11H5.976a.11.11 0 01-.11-.11V8.112c0-.06.05-.11.11-.11h1.806c.061 0 .11.05.11.11v2.869H9.84v-2.87c0-.06.05-.11.11-.11zm2.999 0h5.778c.061 0 .111.05.111.11v7.767a.11.11 0 01-.11.112h-5.78a.11.11 0 01-.11-.11V8.111c0-.06.05-.11.11-.11z"/>
    </g>
    
    <!-- Title -->
    <text x="25" y="90" class="card-title">HackerRank</text>
    
    <!-- Arrow -->
    <text x="305" y="115" class="mono" font-size="16" fill="#5eead4">↗</text>
    
    <!-- Glowing Border Animation -->
    <rect width="340" height="130" rx="12" fill="none" stroke="#5eead4" filter="url(#softGlow)">
      <animate attributeName="opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Scanning Effect -->
    <g clip-path="url(#cardClip)">
      
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1" />
    </linearGradient>

    <!-- Twinkling Stars -->
    <circle cx="35" cy="25" r="1.2" fill="#fff" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0s"/>
    </circle>
    <circle cx="170" cy="90" r="1.5" fill="#5eead4" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="280" cy="30" r="1" fill="#fff" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="320" cy="110" r="2" fill="#5eead4" opacity="0">
      <animate attributeName="opacity" values="0;0.5;0" dur="4s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <circle cx="80" cy="110" r="1.2" fill="#fff" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" dur="3.5s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
    <circle cx="220" cy="40" r="1.8" fill="#5eead4" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" dur="2.2s" repeatCount="indefinite" begin="0.8s"/>
    </circle>

    <!-- Shooting Stars -->
    <g filter="url(#softGlow)">
      <line x1="-30" y1="-30" x2="0" y2="0" stroke="url(#starGrad)" stroke-width="2" stroke-linecap="round">
        <animateTransform attributeName="transform" type="translate" from="-20 -20" to="400 400" dur="3s" repeatCount="indefinite" begin="0s" />
      </line>
      <line x1="-40" y1="-40" x2="0" y2="0" stroke="url(#starGrad)" stroke-width="1.5" stroke-linecap="round">
        <animateTransform attributeName="transform" type="translate" from="150 -50" to="400 200" dur="4s" repeatCount="indefinite" begin="1.5s" />
      </line>
      <line x1="-20" y1="-20" x2="0" y2="0" stroke="url(#starGrad)" stroke-width="2.5" stroke-linecap="round">
        <animateTransform attributeName="transform" type="translate" from="-50 50" to="200 300" dur="2.5s" repeatCount="indefinite" begin="2.2s" />
      </line>
      <line x1="-50" y1="-50" x2="0" y2="0" stroke="url(#starGrad)" stroke-width="1" stroke-linecap="round">
        <animateTransform attributeName="transform" type="translate" from="50 -50" to="300 200" dur="3.5s" repeatCount="indefinite" begin="0.8s" />
      </line>
    </g>
  
    </g>
  </g>
</svg>
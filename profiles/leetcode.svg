<svg viewBox="0 0 340 130" xmlns="http://www.w3.org/2000/svg" role="img">
  <defs>
    <filter id="softGlow"><feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="logoGlow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="orbBlur"><feGaussianBlur stdDeviation="25" /></filter>
    
    <pattern id="hexGrid" width="40" height="69.282" patternUnits="userSpaceOnUse" patternTransform="scale(0.8)">
      <path d="M 40 17.321 L 20 5.774 L 0 17.321 L 0 40.415 L 20 51.962 L 40 40.415 Z M 40 51.962 L 20 63.509 L 0 51.962 M 20 5.774 L 20 -5.774 M 20 75.056 L 20 63.509 M 40 17.321 L 60 5.774 M 0 17.321 L -20 5.774 M 40 40.415 L 60 51.962 M 0 40.415 L -20 51.962" stroke="#38bdf8" stroke-opacity="0.05" stroke-width="1.5" fill="none"/>
    </pattern>
    <clipPath id="cardClip">
      <rect width="340" height="130" rx="12"/>
    </clipPath>
  </defs>

  <style>
    .mono { font-family: 'JetBrains Mono', Consolas, 'Fira Code', monospace; }
    .card-bg { fill: #040910; stroke: #38bdf8; stroke-width: 1.5; rx: 12; transition: all 0.3s ease; }
    .card-title { font-family: 'Segoe UI', sans-serif; font-weight: 700; font-size: 16px; fill: #ffffff; letter-spacing: 0.5px; }
    .logo-path { fill: #38bdf8; filter: url(#logoGlow); }
    .btn-text { font-family: 'JetBrains Mono', Consolas, monospace; }
    
    .hover-target { cursor: pointer; outline: none; }
    .hover-target:hover .card-bg { fill: #0a1322; stroke-width: 2.5; filter: url(#softGlow); }
    .verify-btn { transition: all 0.3s ease; }
    .hover-target:hover .verify-btn rect { fill-opacity: 0.2; stroke-opacity: 1; filter: url(#softGlow); }
  </style>
  
  <rect width="340" height="130" rx="12" fill="#040910"/>
  
  <g class="hover-target" clip-path="url(#cardClip)">
    <!-- Orbs Animation -->
    
    <!-- Ambient floating orbs -->
    <g filter="url(#orbBlur)">
      <circle r="60" fill="#38bdf8" opacity="0.3">
        <animate attributeName="cx" values="50; 290; 50" dur="12s" repeatCount="indefinite" />
        <animate attributeName="cy" values="30; 100; 30" dur="8s" repeatCount="indefinite" />
      </circle>
      <circle r="50" fill="#38bdf8" opacity="0.2">
        <animate attributeName="cx" values="290; 50; 290" dur="10s" repeatCount="indefinite" />
        <animate attributeName="cy" values="100; 30; 100" dur="9s" repeatCount="indefinite" />
      </circle>
    </g>
  
    
    <!-- Grid Overlay -->
    <rect width="340" height="130" fill="url(#hexGrid)"/>
    
    <!-- Dark transparent overlay for glassmorphism effect -->
    <rect width="340" height="130" fill="#040910" fill-opacity="0.6"/>
    
    <rect width="340" height="130" class="card-bg" fill="none"/>
    
    <!-- Logo -->
    <g transform="translate(25, 20) scale(1.3)">
      <path class="logo-path" d="M13.483 0a1.374 1.374 0 0 0-.961.438L7.116 6.226l-3.854 4.126a5.266 5.266 0 0 0-1.209 2.104 5.35 5.35 0 0 0-.125.513 5.527 5.527 0 0 0 .062 2.362 5.83 5.83 0 0 0 .349 1.017 5.938 5.938 0 0 0 1.271 1.818l4.277 4.193.039.038c2.248 2.165 5.852 2.133 8.063-.074l2.396-2.392c.54-.54.54-1.414.003-1.955a1.378 1.378 0 0 0-1.951-.003l-2.396 2.392a3.021 3.021 0 0 1-4.205.038l-.02-.019-4.276-4.193c-.652-.64-.972-1.469-.948-2.263a2.68 2.68 0 0 1 .066-.523 2.545 2.545 0 0 1 .619-1.164L9.13 8.114c1.058-1.134 3.204-1.27 4.43-.278l3.501 2.831c.593.48 1.461.387 1.94-.207a1.384 1.384 0 0 0-.207-1.943l-3.5-2.831c-.8-.647-1.766-1.045-2.774-1.202l2.015-2.158A1.384 1.384 0 0 0 13.483 0zm-2.866 12.815a1.38 1.38 0 0 0-1.38 1.382 1.38 1.38 0 0 0 1.38 1.382H20.79a1.38 1.38 0 0 0 1.38-1.382 1.38 1.38 0 0 0-1.38-1.382z"/>
    </g>
    
    <!-- Title -->
    <text x="25" y="80" class="card-title">LeetCode</text>
    
    <!-- Glowing Border Animation -->
    <rect width="340" height="130" rx="12" fill="none" stroke="#38bdf8" filter="url(#softGlow)">
      <animate attributeName="opacity" values="0;0.5;0" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- Verify Button -->
    <g transform="translate(225, 90)" class="verify-btn">
      <rect width="95" height="24" rx="12" fill="#38bdf8" fill-opacity="0.1" stroke="#38bdf8" stroke-opacity="0.5"/>
      <text x="47.5" y="16" class="btn-text" fill="#38bdf8" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="0.5">VERIFY ↗</text>
    </g>
  </g>
</svg>
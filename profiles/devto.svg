<svg viewBox="0 0 340 130" xmlns="http://www.w3.org/2000/svg" role="img">
  <defs>
    <filter id="softGlow"><feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="logoGlow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="orbBlur"><feGaussianBlur stdDeviation="25" /></filter>
    
    <pattern id="hexGrid" width="40" height="69.282" patternUnits="userSpaceOnUse" patternTransform="scale(0.8)">
      <path d="M 40 17.321 L 20 5.774 L 0 17.321 L 0 40.415 L 20 51.962 L 40 40.415 Z M 40 51.962 L 20 63.509 L 0 51.962 M 20 5.774 L 20 -5.774 M 20 75.056 L 20 63.509 M 40 17.321 L 60 5.774 M 0 17.321 L -20 5.774 M 40 40.415 L 60 51.962 M 0 40.415 L -20 51.962" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1.5" fill="none"/>
    </pattern>
    <clipPath id="cardClip">
      <rect width="340" height="130" rx="12"/>
    </clipPath>
  </defs>

  <style>
    .mono { font-family: 'JetBrains Mono', Consolas, 'Fira Code', monospace; }
    .card-bg { fill: #040910; stroke: #ffffff; stroke-width: 1.5; rx: 12; transition: all 0.3s ease; }
    .card-title { font-family: 'Segoe UI', sans-serif; font-weight: 700; font-size: 16px; fill: #ffffff; letter-spacing: 0.5px; }
    .logo-path { fill: #ffffff; filter: url(#logoGlow); }
    .btn-text { font-family: 'JetBrains Mono', Consolas, monospace; }
    
    .hover-target { cursor: pointer; outline: none; }
    .hover-target:hover .card-bg { fill: #0a1322; stroke-width: 2.5; filter: url(#softGlow); }
    .verify-btn { transition: all 0.3s ease; }
    .hover-target:hover .verify-btn rect { fill-opacity: 0.2; stroke-opacity: 1; filter: url(#softGlow); }
  </style>
  
  <rect width="340" height="130" rx="12" fill="#040910"/>
  
  <g class="hover-target" clip-path="url(#cardClip)">
    <!-- Orbs Animation -->
    
    <!-- Ambient floating orbs -->
    <g filter="url(#orbBlur)">
      <circle r="60" fill="#ffffff" opacity="0.3">
        <animate attributeName="cx" values="50; 290; 50" dur="12s" repeatCount="indefinite" />
        <animate attributeName="cy" values="30; 100; 30" dur="8s" repeatCount="indefinite" />
      </circle>
      <circle r="50" fill="#ffffff" opacity="0.2">
        <animate attributeName="cx" values="290; 50; 290" dur="10s" repeatCount="indefinite" />
        <animate attributeName="cy" values="100; 30; 100" dur="9s" repeatCount="indefinite" />
      </circle>
    </g>
  
    
    <!-- Grid Overlay -->
    <rect width="340" height="130" fill="url(#hexGrid)"/>
    
    <!-- Dark transparent overlay for glassmorphism effect -->
    <rect width="340" height="130" fill="#040910" fill-opacity="0.6"/>
    
    <rect width="340" height="130" class="card-bg" fill="none"/>
    
    <!-- Logo -->
    <g transform="translate(25, 20) scale(1.3)">
      <path class="logo-path" d="M7.42 10.05c-.18-.16-.46-.23-.84-.23H6l.02 2.44.04 2.45.56-.02c.41 0 .63-.07.83-.26.24-.24.26-.36.26-2.2 0-1.91-.02-1.96-.29-2.18zM0 4.94v14.12h24V4.94H0zM8.56 15.3c-.44.58-1.06.77-2.53.77H4.71V8.53h1.4c1.67 0 2.16.18 2.6.9.27.43.29.6.32 2.57.05 2.23-.02 2.73-.47 3.3zm5.09-5.47h-2.47v1.77h1.52v1.28l-.72.04-.75.03v1.77l1.22.03 1.2.04v1.28h-1.6c-1.53 0-1.6-.01-1.87-.3l-.3-.28v-3.16c0-3.02.01-3.18.25-3.48.23-.31.25-.31 1.88-.31h1.64v1.3zm4.68 5.45c-.17.43-.64.79-1 .79-.18 0-.45-.15-.67-.39-.32-.32-.45-.63-.82-2.08l-.9-3.39-.45-1.67h.76c.4 0 .75.02.75.05 0 .06 1.16 4.54 1.26 4.83.04.15.32-.7.73-2.3l.66-2.52.74-.04c.4-.02.73 0 .73.04 0 .14-1.67 6.38-1.8 6.68z"/>
    </g>
    
    <!-- Title -->
    <text x="25" y="80" class="card-title">DEV.TO Community Member</text>
    
    <!-- Glowing Border Animation -->
    <rect width="340" height="130" rx="12" fill="none" stroke="#ffffff" filter="url(#softGlow)">
      <animate attributeName="opacity" values="0;0.5;0" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- Verify Button -->
    <g transform="translate(225, 90)" class="verify-btn">
      <rect width="95" height="24" rx="12" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.5"/>
      <text x="47.5" y="16" class="btn-text" fill="#ffffff" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="0.5">VERIFY ↗</text>
    </g>
  </g>
</svg>
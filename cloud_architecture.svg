<svg viewBox="0 0 1200 650" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cloud &amp; Services Architecture Map">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#02060f"/>
      <stop offset="50%" stop-color="#081324"/>
      <stop offset="100%" stop-color="#02050a"/>
    </linearGradient>

    <!-- Aurora and Glows -->
    <radialGradient id="auroraGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F472B6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F472B6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>

    <!-- Text Gradients -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#BAE6FD"/>
      <stop offset="50%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#5EEAD4"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>

    <!-- ICONS DEFINITIONS -->
    <g id="icon-compute" stroke="#38BDF8" stroke-width="2" fill="none" transform="scale(0.8)">
      <rect x="-8" y="-10" width="16" height="6" rx="1"/>
      <rect x="-8" y="-1" width="16" height="6" rx="1"/>
      <rect x="-8" y="8" width="16" height="6" rx="1"/>
      <circle cx="-4" cy="-7" r="1" fill="#38BDF8"/>
      <circle cx="-4" cy="2" r="1" fill="#38BDF8"/>
      <circle cx="-4" cy="11" r="1" fill="#38BDF8"/>
    </g>
    
    <g id="icon-storage" stroke="#5EEAD4" stroke-width="2" fill="none" transform="scale(0.8)">
      <path d="M-8,-8 C-8,-12 8,-12 8,-8 L8,8 C8,12 -8,12 -8,8 Z"/>
      <path d="M-8,-8 C-8,-4 8,-4 8,-8"/>
      <line x1="-3" y1="2" x2="3" y2="2"/>
    </g>

    <g id="icon-db" stroke="#818CF8" stroke-width="2" fill="none" transform="scale(0.8)">
      <ellipse cx="0" cy="-7" rx="8" ry="3"/>
      <path d="M-8,-7 L-8,1 C-8,4 8,4 8,1 L8,-7"/>
      <path d="M-8,1 L-8,9 C-8,12 8,12 8,9 L8,1"/>
    </g>

    <g id="icon-network" stroke="#A78BFA" stroke-width="2" fill="none" transform="scale(0.8)">
      <path d="M-5,4 C-9,4 -10,0 -8,-3 C-9,-7 -4,-10 0,-8 C4,-10 9,-7 8,-3 C10,0 9,4 5,4 Z"/>
      <circle cx="0" cy="-2" r="1.5" fill="#A78BFA"/>
    </g>

    <g id="icon-security" stroke="#F87171" stroke-width="2" fill="none" transform="scale(0.8)">
      <path d="M0,-10 L8,-6 L8,2 C8,8 0,12 0,12 C0,12 -8,8 -8,2 L-8,-6 Z"/>
      <circle cx="0" cy="1" r="2"/>
      <line x1="0" y1="3" x2="0" y2="6"/>
    </g>

    <g id="icon-serverless" stroke="#FCD34D" stroke-width="2" fill="none" transform="scale(0.8)">
      <path d="M-6,8 L0,-8 L6,8"/>
      <path d="M-3,-1 L3,8"/>
    </g>

    <g id="icon-monitor" stroke="#34D399" stroke-width="2" fill="none" transform="scale(0.8)">
      <rect x="-9" y="-7" width="18" height="14" rx="2"/>
      <polyline points="-5,1 -2,1 0,-3 3,5 5,1 7,1"/>
    </g>
    
    <g id="icon-container" stroke="#60A5FA" stroke-width="2" fill="none" transform="scale(0.8)">
      <polygon points="0,-10 8,-5 8,5 0,10 -8,5 -8,-5"/>
      <circle cx="0" cy="0" r="2" fill="#60A5FA"/>
    </g>
    
    <g id="icon-global" stroke="#F472B6" stroke-width="2" fill="none" transform="scale(0.8)">
      <circle cx="0" cy="0" r="9"/>
      <ellipse cx="0" cy="0" rx="4" ry="9"/>
      <line x1="-9" y1="0" x2="9" y2="0"/>
    </g>
  </defs>

  <style>
    .t-mono { font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace; }
    .t-main { font-family: 'Segoe UI', Roboto, sans-serif; }
    .node-bg { fill: #041224; stroke: #22D3EE; stroke-opacity: 0.25; stroke-width: 1.5; rx: 8; transition: all 0.3s; }
    .node-text { fill: #F0F9FF; font-size: 14.5px; font-weight: 600; }
    .cloud-panel { fill: #061121; fill-opacity: 0.8; stroke: #38BDF8; stroke-opacity: 0.15; stroke-width: 1.5; rx: 16; }
    .cloud-title { fill: #E0F2FE; font-size: 18px; font-weight: 800; letter-spacing: 2px; }
    .conn-line { stroke: #38BDF8; stroke-opacity: 0.2; stroke-width: 2; fill: none; }
    .conn-glow { stroke: #5EEAD4; stroke-opacity: 0.5; stroke-width: 2; fill: none; filter: url(#glow); stroke-dasharray: 4 8; }
  </style>

  <!-- ==================== ANIMATED BACKGROUND ==================== -->
  <!-- Base Background -->
  <rect width="1200" height="650" fill="url(#bg)" rx="16"/>

  <!-- Orbital Data Rings -->
  <g transform="translate(600, 325)" opacity="0.12">
    <circle r="500" fill="none" stroke="#22D3EE" stroke-width="1.5" stroke-dasharray="15 35">
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="120s" repeatCount="indefinite"/>
    </circle>
    <circle r="380" fill="none" stroke="#5EEAD4" stroke-width="2" stroke-dasharray="150 50 20 60">
      <animateTransform attributeName="transform" type="rotate" values="360; 0" dur="90s" repeatCount="indefinite"/>
    </circle>
    <circle r="250" fill="none" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="4 8">
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="60s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Constellation Neural Nodes -->
  <g stroke="#38BDF8" stroke-opacity="0.3" stroke-width="1" fill="none">
    <path d="M 120,80 L 250,150 L 180,280 Z">
       <animate attributeName="opacity" values="0.1; 0.7; 0.1" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M 900,100 L 1080,180 L 1020,320 L 850,220 Z">
       <animate attributeName="opacity" values="0.1; 0.6; 0.1" dur="6s" repeatCount="indefinite"/>
    </path>
    <path d="M 100,500 L 220,600 L 350,480 Z">
       <animate attributeName="opacity" values="0.1; 0.8; 0.1" dur="7s" repeatCount="indefinite"/>
    </path>
    <path d="M 850,550 L 1000,450 L 1150,580 Z">
       <animate attributeName="opacity" values="0.1; 0.7; 0.1" dur="4.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Pulsing Data Cores -->
  <g fill="#5EEAD4" filter="url(#glow)">
    <circle r="3" cx="250" cy="150" opacity="0">
       <animate attributeName="opacity" values="0; 0.9; 0" dur="5s" repeatCount="indefinite"/>
       <animate attributeName="r" values="1; 4; 1" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" cx="1080" cy="180" opacity="0" fill="#F472B6">
       <animate attributeName="opacity" values="0; 0.9; 0" dur="6s" repeatCount="indefinite" begin="1s"/>
       <animate attributeName="r" values="1; 5; 1" dur="6s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle r="3" cx="220" cy="600" opacity="0" fill="#38BDF8">
       <animate attributeName="opacity" values="0; 0.9; 0" dur="7s" repeatCount="indefinite" begin="2s"/>
       <animate attributeName="r" values="2; 6; 2" dur="7s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <circle r="3" cx="1000" cy="450" opacity="0" fill="#8B5CF6">
       <animate attributeName="opacity" values="0; 0.9; 0" dur="4.5s" repeatCount="indefinite" begin="0.5s"/>
       <animate attributeName="r" values="1; 4; 1" dur="4.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
  </g>

  <!-- Ambient Auroras -->
  <circle cx="300" cy="300" r="350" fill="url(#auroraGlow)" filter="url(#softGlow)">
    <animate attributeName="cx" values="200; 400; 200" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3; 0.7; 0.3" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="150" r="300" fill="url(#auroraPink)" filter="url(#softGlow)">
    <animate attributeName="cy" values="100; 300; 100" dur="22s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3; 0.6; 0.3" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="500" r="400" fill="url(#auroraPurple)" filter="url(#softGlow)">
    <animate attributeName="cx" values="600; 800; 600" dur="25s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2; 0.5; 0.2" dur="12s" repeatCount="indefinite"/>
  </circle>

  <!-- Title -->
  <g filter="url(#glow)">
    <text x="50" y="55" class="t-mono" font-size="22" fill="url(#textGrad)" font-weight="bold">> Cloud &amp; Services</text>
  </g>
  <line x1="50" y1="75" x2="400" y2="75" stroke="url(#textGrad)" stroke-width="2" opacity="0.4">
    <animate attributeName="x2" values="50; 400" dur="2s" fill="freeze"/>
  </line>

  <!-- ==================== AWS CLOUD PANEL ==================== -->
  <g transform="translate(40, 100)">
    <rect width="480" height="510" class="cloud-panel"/>
    <text x="30" y="40" class="t-main cloud-title">☁️ AMAZON WEB SERVICES (AWS)</text>
    
    <!-- Compute Row -->
    <text x="30" y="80" class="t-mono" font-size="12" fill="#7C93A8">COMPUTE &amp; CONTAINERS</text>
    
    <g transform="translate(30, 95)">
      <rect width="130" height="45" class="node-bg"/>
      <use href="#icon-compute" x="25" y="22"/>
      <text x="50" y="27" class="t-main node-text">EC2</text>
    </g>
    
    <g transform="translate(175, 95)">
      <rect width="130" height="45" class="node-bg"/>
      <use href="#icon-serverless" x="25" y="22"/>
      <text x="50" y="27" class="t-main node-text">Lambda</text>
    </g>
    
    <g transform="translate(320, 95)">
      <rect width="130" height="45" class="node-bg"/>
      <use href="#icon-container" x="25" y="22"/>
      <text x="50" y="27" class="t-main node-text">EKS / ECS</text>
    </g>

    <!-- Storage & Database Row -->
    <text x="30" y="175" class="t-mono" font-size="12" fill="#7C93A8">STORAGE &amp; DATABASES</text>
    
    <g transform="translate(30, 190)">
      <rect width="130" height="45" class="node-bg"/>
      <use href="#icon-storage" x="25" y="22"/>
      <text x="50" y="27" class="t-main node-text">S3</text>
    </g>

    <g transform="translate(175, 190)">
      <rect width="130" height="45" class="node-bg"/>
      <use href="#icon-db" x="25" y="22"/>
      <text x="50" y="27" class="t-main node-text">RDS</text>
    </g>

    <g transform="translate(320, 190)">
      <rect width="130" height="45" class="node-bg"/>
      <use href="#icon-db" x="25" y="22"/>
      <text x="50" y="27" class="t-main node-text">DynamoDB</text>
    </g>

    <!-- Networking & Delivery Row -->
    <text x="30" y="270" class="t-mono" font-size="12" fill="#7C93A8">NETWORKING &amp; DELIVERY</text>
    
    <g transform="translate(30, 285)">
      <rect width="130" height="45" class="node-bg"/>
      <use href="#icon-network" x="25" y="22"/>
      <text x="50" y="27" class="t-main node-text">VPC</text>
    </g>

    <g transform="translate(175, 285)">
      <rect width="130" height="45" class="node-bg"/>
      <use href="#icon-global" x="25" y="22"/>
      <text x="50" y="27" class="t-main node-text">Route53</text>
    </g>

    <g transform="translate(320, 285)">
      <rect width="130" height="45" class="node-bg"/>
      <use href="#icon-global" x="25" y="22"/>
      <text x="50" y="27" class="t-main node-text">CloudFront</text>
    </g>

    <!-- Security & Management Row -->
    <text x="30" y="365" class="t-mono" font-size="12" fill="#7C93A8">SECURITY &amp; MANAGEMENT</text>
    
    <g transform="translate(30, 380)">
      <rect width="130" height="45" class="node-bg"/>
      <use href="#icon-security" x="25" y="22"/>
      <text x="50" y="27" class="t-main node-text">IAM</text>
    </g>

    <g transform="translate(175, 380)">
      <rect width="130" height="45" class="node-bg"/>
      <use href="#icon-monitor" x="25" y="22"/>
      <text x="50" y="27" class="t-main node-text">CloudWatch</text>
    </g>

    <g transform="translate(320, 380)">
      <rect width="130" height="45" class="node-bg"/>
      <use href="#icon-security" x="25" y="22"/>
      <text x="50" y="27" class="t-main node-text">WAF &amp; KMS</text>
    </g>

    <!-- Application Integration Row -->
    <text x="30" y="460" class="t-mono" font-size="12" fill="#7C93A8">APPLICATION INTEGRATION</text>
    <g transform="translate(90, 445)">
      <path d="M 5 25 L 350 25" class="conn-glow">
         <animate attributeName="stroke-dashoffset" values="40;0" dur="1.5s" repeatCount="indefinite"/>
      </path>
    </g>

    <g transform="translate(105, 445)">
      <rect width="130" height="40" class="node-bg" stroke-dasharray="2 4"/>
      <use href="#icon-network" x="25" y="20"/>
      <text x="45" y="25" class="t-main node-text" font-size="13px">SNS / SQS</text>
    </g>
    <g transform="translate(250, 445)">
      <rect width="130" height="40" class="node-bg" stroke-dasharray="2 4"/>
      <use href="#icon-network" x="25" y="20"/>
      <text x="45" y="25" class="t-main node-text" font-size="13px">API Gateway</text>
    </g>
  </g>


  <!-- ==================== MICROSOFT AZURE PANEL ==================== -->
  <g transform="translate(550, 100)">
    <rect width="280" height="510" class="cloud-panel"/>
    <text x="30" y="40" class="t-main cloud-title">☁️ AZURE</text>
    
    <g transform="translate(30, 95)">
      <rect width="220" height="45" class="node-bg"/>
      <use href="#icon-compute" x="25" y="22"/>
      <text x="50" y="27" class="t-main node-text">Virtual Machines</text>
    </g>

    <g transform="translate(30, 160)">
      <rect width="220" height="45" class="node-bg"/>
      <use href="#icon-container" x="25" y="22"/>
      <text x="50" y="27" class="t-main node-text">AKS (Kubernetes)</text>
    </g>

    <g transform="translate(30, 225)">
      <rect width="220" height="45" class="node-bg"/>
      <use href="#icon-storage" x="25" y="22"/>
      <text x="50" y="27" class="t-main node-text">Blob Storage</text>
    </g>

    <g transform="translate(30, 290)">
      <rect width="220" height="45" class="node-bg"/>
      <use href="#icon-network" x="25" y="22"/>
      <text x="50" y="27" class="t-main node-text">Virtual Network (VNet)</text>
    </g>

    <g transform="translate(30, 355)">
      <rect width="220" height="45" class="node-bg"/>
      <use href="#icon-security" x="25" y="22"/>
      <text x="50" y="27" class="t-main node-text">Microsoft Entra ID</text>
    </g>
    
    <g transform="translate(30, 420)">
      <rect width="220" height="45" class="node-bg"/>
      <use href="#icon-serverless" x="25" y="22"/>
      <text x="50" y="27" class="t-main node-text">Azure Functions</text>
    </g>
  </g>


  <!-- ==================== GOOGLE CLOUD (GCP) PANEL ==================== -->
  <g transform="translate(860, 100)">
    <rect width="280" height="510" class="cloud-panel"/>
    <text x="30" y="40" class="t-main cloud-title">☁️ GOOGLE CLOUD</text>
    
    <g transform="translate(30, 95)">
      <rect width="220" height="45" class="node-bg"/>
      <use href="#icon-compute" x="25" y="22"/>
      <text x="50" y="27" class="t-main node-text">Compute Engine</text>
    </g>

    <g transform="translate(30, 160)">
      <rect width="220" height="45" class="node-bg"/>
      <use href="#icon-container" x="25" y="22"/>
      <text x="50" y="27" class="t-main node-text">GKE (Kubernetes)</text>
    </g>

    <g transform="translate(30, 225)">
      <rect width="220" height="45" class="node-bg"/>
      <use href="#icon-storage" x="25" y="22"/>
      <text x="50" y="27" class="t-main node-text">Cloud Storage (GCS)</text>
    </g>

    <g transform="translate(30, 290)">
      <rect width="220" height="45" class="node-bg"/>
      <use href="#icon-network" x="25" y="22"/>
      <text x="50" y="27" class="t-main node-text">Cloud VPC</text>
    </g>

    <g transform="translate(30, 355)">
      <rect width="220" height="45" class="node-bg"/>
      <use href="#icon-security" x="25" y="22"/>
      <text x="50" y="27" class="t-main node-text">Cloud IAM</text>
    </g>
    
    <g transform="translate(30, 420)">
      <rect width="220" height="45" class="node-bg"/>
      <use href="#icon-db" x="25" y="22"/>
      <text x="50" y="27" class="t-main node-text">Cloud SQL / Spanner</text>
    </g>
  </g>

  <!-- ==================== ANIMATED MULTI-CLOUD DATA PIPELINES ==================== -->
  
  <!-- AWS to Azure Data Sync -->
  <path id="aws-az" d="M 520 250 Q 535 250 550 250" class="conn-line"/>
  <path d="M 520 250 Q 535 250 550 250" class="conn-glow">
    <animate attributeName="stroke-dashoffset" values="24;0" dur="1s" repeatCount="indefinite"/>
  </path>
  <circle r="3" fill="#38BDF8" filter="url(#glow)">
    <animateMotion href="#aws-az" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Azure to GCP Data Sync -->
  <path id="az-gcp" d="M 830 310 Q 845 310 860 310" class="conn-line"/>
  <path d="M 830 310 Q 845 310 860 310" class="conn-glow">
    <animate attributeName="stroke-dashoffset" values="24;0" dur="1s" repeatCount="indefinite"/>
  </path>
  <circle r="3" fill="#A78BFA" filter="url(#glow)">
    <animateMotion href="#az-gcp" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- AWS to GCP Global Sync -->
  <path id="aws-gcp" d="M 520 400 Q 690 400 860 400" class="conn-line"/>
  <path d="M 520 400 Q 690 400 860 400" class="conn-glow">
    <animate attributeName="stroke-dashoffset" values="40;0" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <circle r="3" fill="#5EEAD4" filter="url(#glow)">
    <animateMotion href="#aws-gcp" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#38BDF8" filter="url(#glow)">
    <animateMotion href="#aws-gcp" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Static Clean Border (Glowing Border Removed) -->
  <rect x="1" y="1" width="1198" height="648" rx="16" fill="none" stroke="#22D3EE" stroke-opacity="0.25" stroke-width="2"/>
</svg>

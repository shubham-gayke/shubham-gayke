<svg viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cloud &amp; Services Architecture Map">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#02060f"/>
      <stop offset="50%" stop-color="#081324"/>
      <stop offset="100%" stop-color="#02050a"/>
    </linearGradient>

    <!-- Aurora and Glows -->
    <radialGradient id="auroraGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F472B6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F472B6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>

    <!-- Text Gradients -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#BAE6FD"/>
      <stop offset="50%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#5EEAD4"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>

    <!-- ICONS DEFINITIONS -->
    <g id="icon-compute" stroke="#38BDF8" stroke-width="2" fill="none" transform="scale(0.9)">
      <rect x="-8" y="-10" width="16" height="6" rx="1"/>
      <rect x="-8" y="-1" width="16" height="6" rx="1"/>
      <rect x="-8" y="8" width="16" height="6" rx="1"/>
      <circle cx="-4" cy="-7" r="1" fill="#38BDF8"/>
      <circle cx="-4" cy="2" r="1" fill="#38BDF8"/>
      <circle cx="-4" cy="11" r="1" fill="#38BDF8"/>
    </g>
    
    <g id="icon-storage" stroke="#5EEAD4" stroke-width="2" fill="none" transform="scale(0.9)">
      <path d="M-8,-8 C-8,-12 8,-12 8,-8 L8,8 C8,12 -8,12 -8,8 Z"/>
      <path d="M-8,-8 C-8,-4 8,-4 8,-8"/>
      <line x1="-3" y1="2" x2="3" y2="2"/>
    </g>

    <g id="icon-db" stroke="#818CF8" stroke-width="2" fill="none" transform="scale(0.9)">
      <ellipse cx="0" cy="-7" rx="8" ry="3"/>
      <path d="M-8,-7 L-8,1 C-8,4 8,4 8,1 L8,-7"/>
      <path d="M-8,1 L-8,9 C-8,12 8,12 8,9 L8,1"/>
    </g>
    
    <g id="icon-analytics" stroke="#C084FC" stroke-width="2" fill="none" transform="scale(0.9)">
      <rect x="-9" y="0" width="4" height="8" rx="0.5"/>
      <rect x="-2" y="-4" width="4" height="12" rx="0.5"/>
      <rect x="5" y="-9" width="4" height="17" rx="0.5"/>
      <line x1="-10" y1="10" x2="10" y2="10"/>
    </g>

    <g id="icon-network" stroke="#A78BFA" stroke-width="2" fill="none" transform="scale(0.9)">
      <path d="M-5,4 C-9,4 -10,0 -8,-3 C-9,-7 -4,-10 0,-8 C4,-10 9,-7 8,-3 C10,0 9,4 5,4 Z"/>
      <circle cx="0" cy="-2" r="1.5" fill="#A78BFA"/>
    </g>

    <g id="icon-security" stroke="#F87171" stroke-width="2" fill="none" transform="scale(0.9)">
      <path d="M0,-10 L8,-6 L8,2 C8,8 0,12 0,12 C0,12 -8,8 -8,2 L-8,-6 Z"/>
      <circle cx="0" cy="1" r="2"/>
      <line x1="0" y1="3" x2="0" y2="6"/>
    </g>

    <g id="icon-serverless" stroke="#FCD34D" stroke-width="2" fill="none" transform="scale(0.9)">
      <path d="M-6,8 L0,-8 L6,8"/>
      <path d="M-3,-1 L3,8"/>
    </g>

    <g id="icon-pipeline" stroke="#FBBF24" stroke-width="2" fill="none" transform="scale(0.9)">
      <rect x="-10" y="-4" width="6" height="8" rx="1"/>
      <rect x="4" y="-4" width="6" height="8" rx="1"/>
      <line x1="-4" y1="0" x2="4" y2="0"/>
      <polygon points="1,-3 4,0 1,3" fill="#FBBF24"/>
    </g>

    <g id="icon-monitor" stroke="#34D399" stroke-width="2" fill="none" transform="scale(0.9)">
      <rect x="-9" y="-7" width="18" height="14" rx="2"/>
      <polyline points="-5,1 -2,1 0,-3 3,5 5,1 7,1"/>
    </g>
    
    <g id="icon-container" stroke="#60A5FA" stroke-width="2" fill="none" transform="scale(0.9)">
      <polygon points="0,-10 8,-5 8,5 0,10 -8,5 -8,-5"/>
      <circle cx="0" cy="0" r="2" fill="#60A5FA"/>
    </g>
    
    <g id="icon-global" stroke="#F472B6" stroke-width="2" fill="none" transform="scale(0.9)">
      <circle cx="0" cy="0" r="9"/>
      <ellipse cx="0" cy="0" rx="4" ry="9"/>
      <line x1="-9" y1="0" x2="9" y2="0"/>
    </g>
  </defs>

  <style>
    .t-mono { font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace; }
    .t-main { font-family: 'Segoe UI', Roboto, sans-serif; }
    .node-bg { fill: #041224; stroke: #22D3EE; stroke-opacity: 0.25; stroke-width: 1.5; rx: 10; transition: all 0.3s; }
    .node-text { fill: #F0F9FF; font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
    .cloud-panel { fill: #061121; fill-opacity: 0.8; stroke: #38BDF8; stroke-opacity: 0.15; stroke-width: 1.5; rx: 16; }
    .cloud-title { fill: #E0F2FE; font-size: 20px; font-weight: 800; letter-spacing: 2.5px; }
  </style>

  <!-- ==================== ANIMATED BACKGROUND ==================== -->
  <rect width="1200" height="680" fill="url(#bg)" rx="16"/>

  <g transform="translate(600, 340)" opacity="0.12">
    <circle r="550" fill="none" stroke="#22D3EE" stroke-width="1.5" stroke-dasharray="15 35">
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="120s" repeatCount="indefinite"/>
    </circle>
    <circle r="400" fill="none" stroke="#5EEAD4" stroke-width="2" stroke-dasharray="150 50 20 60">
      <animateTransform attributeName="transform" type="rotate" values="360; 0" dur="90s" repeatCount="indefinite"/>
    </circle>
    <circle r="250" fill="none" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="4 8">
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="60s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g stroke="#38BDF8" stroke-opacity="0.3" stroke-width="1" fill="none">
    <path d="M 150,80 L 250,150 L 220,280 Z">
       <animate attributeName="opacity" values="0.1; 0.7; 0.1" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M 900,100 L 980,180 L 950,320 L 850,220 Z">
       <animate attributeName="opacity" values="0.1; 0.6; 0.1" dur="6s" repeatCount="indefinite"/>
    </path>
    <path d="M 480,200 L 580,300 L 650,180 Z">
       <animate attributeName="opacity" values="0.1; 0.8; 0.1" dur="7s" repeatCount="indefinite"/>
    </path>
    <path d="M 100,500 L 200,600 L 300,520 Z">
       <animate attributeName="opacity" values="0.1; 0.8; 0.1" dur="7s" repeatCount="indefinite"/>
    </path>
    <path d="M 850,550 L 1000,450 L 1150,580 Z">
       <animate attributeName="opacity" values="0.1; 0.7; 0.1" dur="4.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <g fill="#5EEAD4" filter="url(#glow)">
    <circle r="3" cx="150" cy="150" opacity="0">
       <animate attributeName="opacity" values="0; 0.9; 0" dur="5s" repeatCount="indefinite"/>
       <animate attributeName="r" values="1; 4; 1" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" cx="980" cy="180" opacity="0" fill="#F472B6">
       <animate attributeName="opacity" values="0; 0.9; 0" dur="6s" repeatCount="indefinite" begin="1s"/>
       <animate attributeName="r" values="1; 5; 1" dur="6s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle r="3" cx="280" cy="300" opacity="0" fill="#38BDF8">
       <animate attributeName="opacity" values="0; 0.9; 0" dur="7s" repeatCount="indefinite" begin="2s"/>
       <animate attributeName="r" values="2; 6; 2" dur="7s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <circle r="3" cx="880" cy="350" opacity="0" fill="#8B5CF6">
       <animate attributeName="opacity" values="0; 0.9; 0" dur="4.5s" repeatCount="indefinite" begin="0.5s"/>
       <animate attributeName="r" values="1; 4; 1" dur="4.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
  </g>

  <circle cx="300" cy="340" r="350" fill="url(#auroraGlow)" filter="url(#softGlow)">
    <animate attributeName="cx" values="150; 450; 150" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3; 0.7; 0.3" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="220" r="350" fill="url(#auroraPink)" filter="url(#softGlow)">
    <animate attributeName="cy" values="150; 450; 150" dur="22s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3; 0.6; 0.3" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="520" r="400" fill="url(#auroraPurple)" filter="url(#softGlow)">
    <animate attributeName="cx" values="400; 800; 400" dur="25s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2; 0.5; 0.2" dur="12s" repeatCount="indefinite"/>
  </circle>

  <!-- Title -->
  <g filter="url(#glow)">
    <text x="30" y="55" class="t-mono" font-size="24" fill="url(#textGrad)" font-weight="bold">> Cloud &amp; Services</text>
  </g>
  <line x1="30" y1="75" x2="350" y2="75" stroke="url(#textGrad)" stroke-width="2" opacity="0.4">
    <animate attributeName="x2" values="30; 350" dur="2s" fill="freeze"/>
  </line>

  <!-- ==================== AWS CLOUD PANEL (HORIZONTAL GRID) ==================== -->
  <g transform="translate(30, 100)">
    <rect width="1140" height="550" class="cloud-panel"/>
    <text x="55" y="45" class="t-main cloud-title">☁️ AMAZON WEB SERVICES (AWS) — CORE ARCHITECTURE</text>
    <path d="M 55 65 L 1085 65" stroke="#38BDF8" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4 4"/>
    
    <!-- Row 1 -->
    <g transform="translate(55, 85)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-compute" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">EC2</text>
    </g>
    <g transform="translate(265, 85)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-compute" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">Auto Scaling</text>
    </g>
    <g transform="translate(475, 85)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-serverless" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">Lambda</text>
    </g>
    <g transform="translate(685, 85)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-container" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">ECS</text>
    </g>
    <g transform="translate(895, 85)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-container" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">EKS</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(55, 160)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-serverless" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">Elastic Beanstalk</text>
    </g>
    <g transform="translate(265, 160)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-pipeline" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">CodePipeline</text>
    </g>
    <g transform="translate(475, 160)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-storage" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">S3</text>
    </g>
    <g transform="translate(685, 160)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-storage" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">EBS</text>
    </g>
    <g transform="translate(895, 160)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-storage" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">EFS</text>
    </g>

    <!-- Row 3 -->
    <g transform="translate(55, 235)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-db" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">RDS</text>
    </g>
    <g transform="translate(265, 235)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-db" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">DynamoDB</text>
    </g>
    <g transform="translate(475, 235)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-db" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">ElastiCache</text>
    </g>
    <g transform="translate(685, 235)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-analytics" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">Redshift</text>
    </g>
    <g transform="translate(895, 235)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-analytics" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">Athena</text>
    </g>

    <!-- Row 4 -->
    <g transform="translate(55, 310)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-analytics" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">Glue</text>
    </g>
    <g transform="translate(265, 310)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-network" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">VPC</text>
    </g>
    <g transform="translate(475, 310)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-global" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">Route 53</text>
    </g>
    <g transform="translate(685, 310)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-network" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">ELB</text>
    </g>
    <g transform="translate(895, 310)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-network" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">API Gateway</text>
    </g>

    <!-- Row 5 -->
    <g transform="translate(55, 385)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-security" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">IAM</text>
    </g>
    <g transform="translate(265, 385)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-security" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">WAF</text>
    </g>
    <g transform="translate(475, 385)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-security" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">Secrets Manager</text>
    </g>
    <g transform="translate(685, 385)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-monitor" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">CloudWatch</text>
    </g>
    <g transform="translate(895, 385)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-monitor" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">CloudTrail</text>
    </g>

    <!-- Row 6 (Centered 3 items) -->
    <g transform="translate(265, 460)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-serverless" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">CloudFormation</text>
    </g>
    <g transform="translate(475, 460)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-network" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">SNS</text>
    </g>
    <g transform="translate(685, 460)">
      <rect width="190" height="60" class="node-bg"/>
      <use href="#icon-network" x="25" y="30"/>
      <text x="55" y="36" class="t-main node-text">SQS</text>
    </g>
  </g>

  <!-- Static Clean Border -->
  <rect x="1" y="1" width="1198" height="678" rx="16" fill="none" stroke="#22D3EE" stroke-opacity="0.25" stroke-width="2"/>
</svg>

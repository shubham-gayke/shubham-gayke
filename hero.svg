<svg viewBox="0 0 1200 380" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Shubham Gayke — DevOps Engineer">
  <defs>
    <linearGradient id="ggh-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040910"/>
      <stop offset="55%" stop-color="#071627"/>
      <stop offset="100%" stop-color="#04101c"/>
    </linearGradient>

    <radialGradient id="ggh-auroraBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ggh-auroraCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.48"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ggh-auroraTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5EEAD4" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#5EEAD4" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="ggh-nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#BAE6FD"/>
      <stop offset="35%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#E0F2FE"/>
      <stop offset="75%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#5EEAD4"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.5 0; 0.5 0; -0.5 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="ggh-scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7DD3FC" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="ggh-borderGrad" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#7DD3FC" stop-opacity="0"/>
      <stop offset="45%" stop-color="#7DD3FC" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#5EEAD4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5EEAD4" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="rotate" values="0 600 190; 360 600 190" dur="9s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="ggh-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ggh-glow-strong" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="ggh-softblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <filter id="ggh-grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.55  0 0 0 0 0.82  0 0 0 0 0.95  0 0 0 0.05 0"/>
    </filter>

    <clipPath id="ggh-frame">
      <rect x="0" y="0" width="1200" height="380" rx="28" ry="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#ggh-frame)">
    <rect x="0" y="0" width="1200" height="380" fill="url(#ggh-bg)"/>

    <!-- Ambient aurora drift -->
    <circle cx="220" cy="90" r="200" fill="url(#ggh-auroraBlue)" filter="url(#ggh-softblur)">
      <animate attributeName="cx" values="200;340;200" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="90;170;90" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="950" cy="260" r="240" fill="url(#ggh-auroraCyan)" filter="url(#ggh-softblur)">
      <animate attributeName="cx" values="950;800;950" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="260;180;260" dur="14s" repeatCount="indefinite"/>
    </circle>

    <!-- Background tech nodes -->
    <g fill="none" stroke="#22D3EE" stroke-opacity="0.15" stroke-width="1.5">
       <path d="M 500,0 L 550,100 L 550,380"/>
       <path d="M 550,100 L 700,50 L 750,150"/>
    </g>

    <!-- fine grain texture -->
    <rect x="0" y="0" width="1200" height="380" filter="url(#ggh-grain)" opacity="0.05"/>

    <!-- moving scanline -->
    <rect x="0" y="-6" width="1200" height="3" fill="url(#ggh-scanGrad)">
      <animate attributeName="y" values="-10;390" dur="5.5s" repeatCount="indefinite"/>
    </rect>

    <!-- watermark -->
    <text x="1150" y="34" text-anchor="end" font-family="'JetBrains Mono',Consolas,monospace" font-size="12" fill="#7C93A8" opacity="0.4">GLACIER.OS</text>

    <!-- greeting -->
    <text x="40" y="45" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="22" fill="#8FB4CC">Hi, I'm</text>

    <!-- name -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -3; 0 0" dur="6s" repeatCount="indefinite"/>
      <text x="38" y="110" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="62" font-weight="600" letter-spacing="0.5" fill="url(#ggh-nameGrad)" filter="url(#ggh-glow)">SHUBHAM GAYKE</text>
    </g>

    <!-- typed role cycle -->
    <g font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="24" fill="#D7F3FF">
      <text x="40" y="160" opacity="0">
        DevOps Engineer<tspan fill="#22D3EE">▌</tspan>
        <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.25;0.2501;1" dur="12s" begin="0s" repeatCount="indefinite"/>
      </text>
      <text x="40" y="160" opacity="0">
        Cloud Architect<tspan fill="#22D3EE">▌</tspan>
        <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.25;0.2501;1" dur="12s" begin="3s" repeatCount="indefinite"/>
      </text>
      <text x="40" y="160" opacity="0">
        AI Automation Specialist<tspan fill="#22D3EE">▌</tspan>
        <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.25;0.2501;1" dur="12s" begin="6s" repeatCount="indefinite"/>
      </text>
      <text x="40" y="160" opacity="0">
        Builder of Self-Healing Systems<tspan fill="#22D3EE">▌</tspan>
        <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.25;0.2501;1" dur="12s" begin="9s" repeatCount="indefinite"/>
      </text>
    </g>
    
    <!-- divider -->
    <line x1="40" y1="185" x2="550" y2="185" stroke="url(#ggh-nameGrad)" stroke-width="1.4" opacity="0.6">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="4s" repeatCount="indefinite"/>
    </line>

    <!-- B-Tech CSE Badge -->
    <rect x="40" y="200" width="125" height="34" rx="17" fill="#5EEAD4" fill-opacity="0.07" stroke="#5EEAD4" stroke-opacity="0.45"/>
    <circle cx="59" cy="217" r="5" fill="#5EEAD4">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <text x="75" y="222" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="13" letter-spacing="1.5" fill="#5EEAD4" filter="url(#ggh-glow)">B-TECH CSE</text>

    <!-- tagline (Highly Visible) -->
    <text x="185" y="222" font-family="'JetBrains Mono',Consolas,monospace" font-size="14.5" fill="#BAE6FD" opacity="0.9">
      // infrastructure should be invisible, automated, self-healing
      <animate attributeName="opacity" values="0.8;1;0.8" dur="5s" repeatCount="indefinite"/>
    </text>

    <!-- Contact Info (Glowing & Bold) -->
    <g font-family="'JetBrains Mono',Consolas,monospace" font-size="16" font-weight="bold">
      <text x="40" y="270" fill="#38BDF8" filter="url(#ggh-glow-strong)">
        📞 +91 9168469745
        <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
      </text>
      
      <text x="40" y="305" fill="#5EEAD4" filter="url(#ggh-glow-strong)">
        ✉ shubhamgayke9860@gmail.com
        <animate attributeName="opacity" values="0.8;1;0.8" dur="3.5s" repeatCount="indefinite"/>
      </text>

      <text x="40" y="340" fill="#BAE6FD" filter="url(#ggh-glow)">
        📍 Pune, India
      </text>
    </g>

    <!-- ═════════════════ DEVOPS TOOLCHAIN (RIGHT SIDE) ═════════════════ -->
    
    <!-- Background connecting network -->
    <g fill="none" stroke="#22D3EE" stroke-width="1.5" stroke-dasharray="2 6" opacity="0.2">
      <path d="M 820,180 L 920,90 L 1080,110"/>
      <path d="M 820,180 L 890,260 L 1050,290"/>
      <path d="M 1080,110 L 1100,200 L 1050,290"/>
      <path d="M 920,90 L 980,190 L 890,260"/>
      <!-- Links for new tools -->
      <path d="M 890,260 L 780,260 L 820,180"/>
      <path d="M 920,90 L 840,110 L 820,180"/>
    </g>

    <!-- LINUX (Tux Penguin) -->
    <g transform="translate(840, 110)">
      <g filter="url(#ggh-glow)">
        <animateTransform attributeName="transform" type="rotate" values="-8; 8; -8" dur="3s" repeatCount="indefinite"/>
        <!-- Penguin Body -->
        <ellipse cx="0" cy="0" rx="12" ry="17" fill="#E2E8F0"/>
        <path d="M-10,-5 Q0,-15 10,-5 L12,5 Q0,20 -12,5 Z" fill="#040910" stroke="#E2E8F0" stroke-width="2"/>
        <!-- Beak -->
        <polygon points="-4,-2 4,-2 0,4" fill="#FCA326"/>
      </g>
      <text y="28" font-family="monospace" font-size="10" fill="#7C93A8" text-anchor="middle">LINUX</text>
    </g>

    <!-- JENKINS (Bowtie) -->
    <g transform="translate(770, 250)">
      <g filter="url(#ggh-glow)">
        <animateTransform attributeName="transform" type="translate" values="0 -5; 0 5; 0 -5" dur="4s" repeatCount="indefinite"/>
        <!-- Bowtie -->
        <polygon points="-12,-5 0,0 -12,5" fill="#D33833"/>
        <polygon points="12,-5 0,0 12,5" fill="#D33833"/>
        <circle cx="0" cy="0" r="3" fill="#FFF"/>
        <!-- Face/Mustache outline -->
        <path d="M-8,-8 Q0,-12 8,-8" fill="none" stroke="#F0D6B7" stroke-width="2"/>
      </g>
      <text y="20" font-family="monospace" font-size="10" fill="#7C93A8" text-anchor="middle">JENKINS</text>
    </g>

    <!-- KUBERNETES -->
    <g transform="translate(1080, 110)">
      <g filter="url(#ggh-glow)">
        <animateTransform attributeName="transform" type="rotate" values="0;360" dur="15s" repeatCount="indefinite"/>
        <polygon points="0,-22 17,-13 21,7 9,21 -9,21 -21,7 -17,-13" fill="none" stroke="#326CE5" stroke-width="3"/>
        <circle cx="0" cy="0" r="10" fill="none" stroke="#326CE5" stroke-width="2"/>
        <line x1="0" y1="0" x2="0" y2="-22" stroke="#326CE5" stroke-width="2"/>
        <line x1="0" y1="0" x2="17" y2="-13" stroke="#326CE5" stroke-width="2"/>
        <line x1="0" y1="0" x2="21" y2="7" stroke="#326CE5" stroke-width="2"/>
        <line x1="0" y1="0" x2="9" y2="21" stroke="#326CE5" stroke-width="2"/>
        <line x1="0" y1="0" x2="-9" y2="21" stroke="#326CE5" stroke-width="2"/>
        <line x1="0" y1="0" x2="-21" y2="7" stroke="#326CE5" stroke-width="2"/>
        <line x1="0" y1="0" x2="-17" y2="-13" stroke="#326CE5" stroke-width="2"/>
      </g>
      <text y="40" font-family="monospace" font-size="10" fill="#7C93A8" text-anchor="middle">K8S</text>
    </g>

    <!-- DOCKER -->
    <g transform="translate(890, 260)">
      <g filter="url(#ggh-glow)">
        <animateTransform attributeName="transform" type="translate" values="-15 0; 15 0; -15 0" dur="4s" repeatCount="indefinite"/>
        <path d="M-15,5 Q0,15 15,5 Q10,-5 20,-10 L-20,-10 Q-20,0 -15,5 Z" fill="#2496ED"/>
        <rect x="-12" y="-18" width="6" height="6" fill="#040910" stroke="#2496ED" stroke-width="1.5"/>
        <rect x="-4" y="-18" width="6" height="6" fill="#040910" stroke="#2496ED" stroke-width="1.5"/>
        <rect x="4" y="-18" width="6" height="6" fill="#040910" stroke="#2496ED" stroke-width="1.5"/>
        <rect x="-8" y="-26" width="6" height="6" fill="#040910" stroke="#2496ED" stroke-width="1.5"/>
        <rect x="0" y="-26" width="6" height="6" fill="#040910" stroke="#2496ED" stroke-width="1.5"/>
      </g>
      <text y="28" font-family="monospace" font-size="10" fill="#7C93A8" text-anchor="middle">DOCKER</text>
    </g>

    <!-- AWS -->
    <g transform="translate(820, 180)">
      <g filter="url(#ggh-glow)">
        <animateTransform attributeName="transform" type="translate" values="0 -8; 0 8; 0 -8" dur="3s" repeatCount="indefinite"/>
        <text y="-5" font-family="'Segoe UI', Arial, sans-serif" font-weight="bold" font-size="18" fill="#FF9900" text-anchor="middle">AWS</text>
        <path d="M -15,5 Q 0,15 18,0" fill="none" stroke="#FF9900" stroke-width="3" stroke-linecap="round"/>
        <polygon points="15,-4 22,-2 18,5" fill="#FF9900"/>
      </g>
    </g>

    <!-- TERRAFORM -->
    <g transform="translate(1050, 290)">
      <g filter="url(#ggh-glow)">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="4.5s" repeatCount="indefinite"/>
        <polygon points="-5,-25 5,-15 5,-5 -5,-15" fill="#7B42BC"/>
        <polygon points="7,-25 17,-15 17,-5 7,-15" fill="#7B42BC"/>
        <polygon points="-5,-12 5,-2 5,8 -5,-2" fill="#7B42BC"/>
        <polygon points="-17,-12 -7,-2 -7,8 -17,-2" fill="#7B42BC"/>
      </g>
      <text y="25" font-family="monospace" font-size="10" fill="#7C93A8" text-anchor="middle">TERRAFORM</text>
    </g>

    <!-- ANSIBLE -->
    <g transform="translate(930, 80)">
      <g filter="url(#ggh-glow)">
        <animateTransform attributeName="transform" type="rotate" values="360;0" dur="20s" repeatCount="indefinite"/>
        <circle cx="0" cy="0" r="18" fill="none" stroke="#EE0000" stroke-width="2.5"/>
        <path d="M -8,8 L 0,-10 L 8,8" fill="none" stroke="#EE0000" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M -4,2 L 4,2" fill="none" stroke="#EE0000" stroke-width="2.5"/>
      </g>
      <text y="32" font-family="monospace" font-size="10" fill="#7C93A8" text-anchor="middle">ANSIBLE</text>
    </g>

    <!-- PROMETHEUS -->
    <g transform="translate(990, 190)">
      <g filter="url(#ggh-glow-strong)">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="1.2s" repeatCount="indefinite"/>
        <!-- Flame shape -->
        <path d="M 0,-15 Q 10,-5 0,10 Q -10,-5 0,-15 Z" fill="#E6522C"/>
        <!-- Base -->
        <polygon points="-8,10 8,10 0,18" fill="#E6522C"/>
      </g>
      <text y="32" font-family="monospace" font-size="10" fill="#7C93A8" text-anchor="middle">PROMETHEUS</text>
    </g>

    <!-- GRAFANA -->
    <g transform="translate(730, 180)">
      <g filter="url(#ggh-glow)">
        <animateTransform attributeName="transform" type="rotate" values="0;360" dur="8s" repeatCount="indefinite"/>
        <path d="M 0,-12 A 12,12 0 0,1 10,7 L 6,10 A 17,17 0 0,0 0,-17 Z" fill="#F47A20"/>
        <path d="M 10,7 A 12,12 0 0,1 -10,7 L -14,10 A 17,17 0 0,0 14,10 Z" fill="#F47A20"/>
        <path d="M -10,7 A 12,12 0 0,1 0,-12 L 0,-17 A 17,17 0 0,0 -14,10 Z" fill="#F47A20"/>
      </g>
      <text y="30" font-family="monospace" font-size="10" fill="#7C93A8" text-anchor="middle">GRAFANA</text>
    </g>

    <!-- GITLAB CI/CD -->
    <g transform="translate(1120, 200)">
      <g filter="url(#ggh-glow)">
        <animateTransform attributeName="transform" type="translate" values="0 -6; 0 6; 0 -6" dur="5s" repeatCount="indefinite"/>
        <polygon points="0,15 15,0 10,-10 5,-2 0,5 -5,-2 -10,-10 -15,0" fill="#FC6D26" stroke="#FC6D26" stroke-width="2"/>
        <polygon points="0,15 15,0 10,5" fill="#E24329"/>
        <polygon points="0,15 -15,0 -10,5" fill="#E24329"/>
        <polygon points="15,0 20,-15 10,-10" fill="#FCA326"/>
        <polygon points="-15,0 -20,-15 -10,-10" fill="#FCA326"/>
      </g>
      <text y="35" font-family="monospace" font-size="10" fill="#7C93A8" text-anchor="middle">GITLAB</text>
    </g>
  </g>
</svg>

<svg viewBox="0 0 1200 350" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Certifications">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040910"/>
      <stop offset="55%" stop-color="#071627"/>
      <stop offset="100%" stop-color="#04101c"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#BAE6FD"/>
      <stop offset="50%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#5EEAD4"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <style>
    .t-mono { font-family: 'JetBrains Mono', Consolas, monospace; }
    .t-main { font-family: 'Segoe UI', Roboto, sans-serif; }
    .cert-box { fill: url(#boxGrad); stroke: #22D3EE; stroke-opacity: 0.3; stroke-width: 1; rx: 8; }
    .cert-title { fill: #E0F2FE; font-size: 14px; font-weight: bold; }
    .cert-issuer { fill: #7C93A8; font-size: 12px; }
    .cert-status { fill: #5EEAD4; font-size: 11px; }
  </style>

  <rect width="1200" height="350" fill="url(#bg)" rx="16"/>
  <rect x="1" y="1" width="1198" height="348" rx="16" fill="none" stroke="#22D3EE" stroke-opacity="0.15"/>
  
  <text x="40" y="45" class="t-mono" font-size="16" fill="url(#textGrad)" font-weight="bold" filter="url(#glow)">> SECURITY_CLEARANCE.verify()</text>

  <g transform="translate(40, 80)">
    <!-- Row 1 -->
    <g transform="translate(0, 0)">
      <rect width="350" height="70" class="cert-box"/>
      <circle cx="20" cy="35" r="4" fill="#5EEAD4" filter="url(#glow)"><animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/></circle>
      <text x="35" y="30" class="t-main cert-title">Oracle Certified DevOps Professional</text>
      <text x="35" y="50" class="t-mono cert-issuer">Oracle</text>
      <text x="280" y="40" class="t-mono cert-status">VERIFIED [🔗]</text>
    </g>
    <g transform="translate(380, 0)">
      <rect width="350" height="70" class="cert-box"/>
      <circle cx="20" cy="35" r="4" fill="#5EEAD4" filter="url(#glow)"><animate attributeName="opacity" values="1;0.4;1" dur="2.2s" repeatCount="indefinite"/></circle>
      <text x="35" y="30" class="t-main cert-title">Oracle AWS Certified Architect Pro</text>
      <text x="35" y="50" class="t-mono cert-issuer">Oracle</text>
      <text x="280" y="40" class="t-mono cert-status">VERIFIED [🔗]</text>
    </g>
    <g transform="translate(760, 0)">
      <rect width="350" height="70" class="cert-box"/>
      <circle cx="20" cy="35" r="4" fill="#5EEAD4" filter="url(#glow)"><animate attributeName="opacity" values="1;0.4;1" dur="2.4s" repeatCount="indefinite"/></circle>
      <text x="35" y="30" class="t-main cert-title">SQL Advanced</text>
      <text x="35" y="50" class="t-mono cert-issuer">HackerRank</text>
      <text x="280" y="40" class="t-mono cert-status">VERIFIED [🔗]</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(0, 90)">
      <rect width="350" height="70" class="cert-box"/>
      <circle cx="20" cy="35" r="4" fill="#5EEAD4" filter="url(#glow)"><animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite"/></circle>
      <text x="35" y="30" class="t-main cert-title">REST API Certification</text>
      <text x="35" y="50" class="t-mono cert-issuer">HackerRank</text>
      <text x="280" y="40" class="t-mono cert-status">VERIFIED [🔗]</text>
    </g>
    <g transform="translate(380, 90)">
      <rect width="350" height="70" class="cert-box"/>
      <circle cx="20" cy="35" r="4" fill="#5EEAD4" filter="url(#glow)"><animate attributeName="opacity" values="1;0.4;1" dur="2.5s" repeatCount="indefinite"/></circle>
      <text x="35" y="30" class="t-main cert-title">Microsoft AI Skills Fest 2026</text>
      <text x="35" y="50" class="t-mono cert-issuer">Microsoft / Credly</text>
      <text x="280" y="40" class="t-mono cert-status">VERIFIED [🔗]</text>
    </g>
    <g transform="translate(760, 90)">
      <rect width="350" height="70" class="cert-box"/>
      <circle cx="20" cy="35" r="4" fill="#5EEAD4" filter="url(#glow)"><animate attributeName="opacity" values="1;0.4;1" dur="1.9s" repeatCount="indefinite"/></circle>
      <text x="35" y="30" class="t-main cert-title">Azure Certification &amp; Achievement</text>
      <text x="35" y="50" class="t-mono cert-issuer">Microsoft</text>
      <text x="280" y="40" class="t-mono cert-status">VERIFIED [🔗]</text>
    </g>

    <!-- Row 3 -->
    <g transform="translate(0, 180)">
      <rect width="350" height="70" class="cert-box"/>
      <circle cx="20" cy="35" r="4" fill="#5EEAD4" filter="url(#glow)"><animate attributeName="opacity" values="1;0.4;1" dur="2.1s" repeatCount="indefinite"/></circle>
      <text x="35" y="30" class="t-main cert-title">GCP Skills &amp; Badges</text>
      <text x="35" y="50" class="t-mono cert-issuer">Google Cloud / Credly</text>
      <text x="280" y="40" class="t-mono cert-status">VERIFIED [🔗]</text>
    </g>
    <g transform="translate(380, 180)">
      <rect width="350" height="70" class="cert-box"/>
      <circle cx="20" cy="35" r="4" fill="#5EEAD4" filter="url(#glow)"><animate attributeName="opacity" values="1;0.4;1" dur="2.3s" repeatCount="indefinite"/></circle>
      <text x="35" y="30" class="t-main cert-title">AWS Solution Architect</text>
      <text x="35" y="50" class="t-mono cert-issuer">Udemy</text>
      <text x="280" y="40" class="t-mono cert-status">VERIFIED [🔗]</text>
    </g>
    <g transform="translate(760, 180)">
      <rect width="350" height="70" class="cert-box"/>
      <circle cx="20" cy="35" r="4" fill="#5EEAD4" filter="url(#glow)"><animate attributeName="opacity" values="1;0.4;1" dur="2.6s" repeatCount="indefinite"/></circle>
      <text x="35" y="30" class="t-main cert-title">Deloitte Completion Certificate</text>
      <text x="35" y="50" class="t-mono cert-issuer">Forage</text>
      <text x="280" y="40" class="t-mono cert-status">VERIFIED [🔗]</text>
    </g>
  </g>
</svg>

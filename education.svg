<svg viewBox="0 0 1200 350" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Education Timeline">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040910"/>
      <stop offset="55%" stop-color="#071627"/>
      <stop offset="100%" stop-color="#04101c"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#BAE6FD"/>
      <stop offset="50%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#5EEAD4"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#5EEAD4"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <style>
    .t-mono { font-family: 'JetBrains Mono', Consolas, monospace; }
    .t-main { font-family: 'Segoe UI', Roboto, sans-serif; }
    .edu-title { fill: #E0F2FE; font-size: 16px; font-weight: bold; }
    .edu-inst { fill: #7C93A8; font-size: 14px; }
    .edu-score { fill: #5EEAD4; font-size: 13px; font-weight: bold; }
    .edu-badge { fill: #eab308; font-size: 12px; font-weight: bold; }
  </style>

  <rect width="1200" height="350" fill="url(#bg)" rx="16"/>
  <rect x="1" y="1" width="1198" height="348" rx="16" fill="none" stroke="#22D3EE" stroke-opacity="0.15"/>
  
  <text x="40" y="45" class="t-mono" font-size="16" fill="url(#textGrad)" font-weight="bold" filter="url(#glow)">> TRAINING_PROTOCOL.timeline()</text>

  <g transform="translate(200, 80)">
    <!-- Timeline Line -->
    <line x1="0" y1="0" x2="0" y2="240" stroke="url(#lineGrad)" stroke-width="3" stroke-opacity="0.4"/>
    <circle r="4" fill="#38BDF8" filter="url(#glow)">
      <animateMotion path="M 0 0 L 0 240" dur="4s" repeatCount="indefinite"/>
    </circle>

    <!-- Item 1 -->
    <g transform="translate(0, 20)">
      <circle cx="0" cy="0" r="8" fill="#040910" stroke="#38BDF8" stroke-width="3" filter="url(#glow)"/>
      <text x="30" y="5" class="t-main edu-title">🎓 B-TECH IN COMPUTER SCIENCE ENGINEERING</text>
      <text x="30" y="30" class="t-main edu-inst">├── Dr. Babasaheb Ambedkar Technological University</text>
      <text x="30" y="50" class="t-main edu-score">└── CGPA: 8.12/10</text>
    </g>

    <!-- Item 2 -->
    <g transform="translate(0, 110)">
      <circle cx="0" cy="0" r="8" fill="#040910" stroke="#22D3EE" stroke-width="3" filter="url(#glow)"/>
      <text x="30" y="5" class="t-main edu-title">🏅 DIPLOMA IN COMPUTER ENGINEERING</text>
      <text x="30" y="30" class="t-main edu-inst">├── MSBTE</text>
      <text x="30" y="50" class="t-main edu-score">├── Score: 92.17%</text>
      <text x="30" y="70" class="t-main edu-badge" filter="url(#glow)">└── 🥇 1ST RANK IN POLYTECHNIC</text>
    </g>

    <!-- Item 3 -->
    <g transform="translate(0, 220)">
      <circle cx="0" cy="0" r="8" fill="#040910" stroke="#5EEAD4" stroke-width="3" filter="url(#glow)"/>
      <text x="30" y="5" class="t-main edu-title">📜 SECONDARY SCHOOL CERTIFICATE (SSC)</text>
      <text x="30" y="30" class="t-main edu-inst">├── Maharashtra State Board</text>
      <text x="30" y="50" class="t-main edu-score">└── Score: 86.40%</text>
    </g>
  </g>
</svg>

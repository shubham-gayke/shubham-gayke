<svg viewBox="0 0 1200 350" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Education Timeline">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="55%" stop-color="#081427"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#BAE6FD"/>
      <stop offset="50%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#5EEAD4"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#5EEAD4"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softGlow"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#22d3ee" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <style>
    .t-mono { font-family: 'JetBrains Mono', Consolas, monospace; }
    .t-main { font-family: 'Segoe UI', Roboto, sans-serif; }
    .edu-title { fill: #E0F2FE; font-size: 16.5px; font-weight: bold; letter-spacing: 0.5px; }
    .edu-inst { fill: #94a3b8; font-size: 14.5px; }
    .edu-score { fill: #5EEAD4; font-size: 13px; font-weight: bold; }
    .edu-badge { fill: #eab308; font-size: 13px; font-weight: bold; letter-spacing: 0.5px; }
  </style>

  <rect width="1200" height="350" fill="url(#bg)" rx="16"/>
  
  <rect x="-60" y="-60" width="1320" height="470" fill="url(#grid)">
    <animateTransform attributeName="transform" type="translate" values="0,0; -40,40" dur="15s" repeatCount="indefinite" />
  </rect>
  
  <rect x="1" y="1" width="1198" height="348" rx="16" fill="none" stroke="#22D3EE" stroke-opacity="0.15"/>
  
  <!-- Ambient Glow -->
  <circle cx="150" cy="150" r="180" fill="#38BDF8" opacity="0.1" filter="url(#softGlow)">
    <animate attributeName="opacity" values="0.05;0.12;0.05" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="950" cy="250" r="220" fill="#5EEAD4" opacity="0.08" filter="url(#softGlow)">
    <animate attributeName="opacity" values="0.03;0.09;0.03" dur="5s" repeatCount="indefinite"/>
  </circle>
  
  <text x="40" y="45" class="t-mono" font-size="18" fill="url(#textGrad)" font-weight="bold" filter="url(#glow)">> Education</text>

  <g transform="translate(150, 60)">
    <!-- Timeline Line -->
    <line x1="0" y1="0" x2="0" y2="240" stroke="url(#lineGrad)" stroke-width="3" stroke-opacity="0.4"/>
    <circle r="5" fill="#ffffff" filter="url(#glow)">
      <animateMotion path="M 0 0 L 0 240" dur="3s" repeatCount="indefinite"/>
    </circle>

    <!-- Item 1 -->
    <g transform="translate(0, 20)">
      <circle cx="0" cy="0" r="8" fill="#040910" stroke="#38BDF8" stroke-width="3" filter="url(#glow)"/>
      <text x="30" y="5" class="t-main edu-title">🎓 B-TECH IN COMPUTER SCIENCE ENGINEERING</text>
      <text x="30" y="30" class="t-main edu-inst">├── Dr. Babasaheb Ambedkar Technological University</text>
      <text x="30" y="50" class="t-mono edu-score">└── CGPA: 8.12/10</text>
    </g>

    <!-- Item 2 -->
    <g transform="translate(0, 110)">
      <circle cx="0" cy="0" r="8" fill="#040910" stroke="#22D3EE" stroke-width="3" filter="url(#glow)"/>
      <text x="30" y="5" class="t-main edu-title">🏅 DIPLOMA IN COMPUTER ENGINEERING</text>
      <text x="30" y="30" class="t-main edu-inst">├── Maharashtra State Board of Technical Education (MSBTE)</text>
      <text x="30" y="50" class="t-mono edu-score">├── Score: 92.17%</text>
      <text x="30" y="70" class="t-main edu-badge" filter="url(#glow)">└── 🥇 1ST RANK IN POLYTECHNIC</text>
    </g>

    <!-- Item 3 -->
    <g transform="translate(0, 220)">
      <circle cx="0" cy="0" r="8" fill="#040910" stroke="#5EEAD4" stroke-width="3" filter="url(#glow)"/>
      <text x="30" y="5" class="t-main edu-title">📜 SECONDARY SCHOOL CERTIFICATE (SSC)</text>
      <text x="30" y="30" class="t-main edu-inst">├── Maharashtra State Board of Secondary &amp; Higher Secondary Education, Pune</text>
      <text x="30" y="50" class="t-mono edu-score">└── Score: 86.40%</text>
    </g>
  </g>
</svg>
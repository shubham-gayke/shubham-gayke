<svg viewBox="0 0 350 80" xmlns="http://www.w3.org/2000/svg" role="img">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  <style>
    .t-mono { font-family: 'JetBrains Mono', Consolas, monospace; }
    .t-main { font-family: 'Segoe UI', Roboto, sans-serif; }
    .cert-box { fill: url(#boxGrad); stroke: #22D3EE; stroke-opacity: 0.35; stroke-width: 1.5; rx: 8; transition: all 0.3s ease; }
    .cert-title { fill: #E0F2FE; font-size: 15.5px; font-weight: 700; }
    .cert-issuer { fill: #7C93A8; font-size: 13px; }
    .cert-status { fill: #22D3EE; font-size: 12.5px; font-weight: bold; }
    
    /* Hover effects for direct SVG views (optional) */
    svg:hover .cert-box { stroke-opacity: 0.8; fill: #22D3EE; fill-opacity: 0.15; }
    svg:hover .cert-status { fill: #ffffff; text-decoration: underline; }
  </style>

  <rect width="348" height="78" x="1" y="1" class="cert-box"/>
  <circle cx="25" cy="40" r="5" fill="#22D3EE" filter="url(#glow)"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></circle>
  <text x="45" y="35" class="t-main cert-title">Azure Trophy & Badge</text>
  <text x="45" y="58" class="t-mono cert-issuer">Microsoft</text>
  
  <rect x="250" y="25" width="85" height="30" rx="4" fill="#22D3EE" fill-opacity="0.1" stroke="#22D3EE" stroke-opacity="0.4"/>
  <text x="292.5" y="44" class="t-mono cert-status" text-anchor="middle">VERIFY 🔗</text>
</svg>
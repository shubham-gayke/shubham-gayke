<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Shubham Gayke Dashboard">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040910"/>
      <stop offset="50%" stop-color="#071627"/>
      <stop offset="100%" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.05"/>
    </linearGradient>
    <!-- Text Gradients -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#BAE6FD"/>
      <stop offset="50%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#5EEAD4"/>
    </linearGradient>
    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="900" fill="url(#bg)"/>
  
  <style>
    .t-main { font-family: 'Segoe UI', Roboto, sans-serif; }
    .t-mono { font-family: 'JetBrains Mono', Consolas, monospace; }
    .txt-title { fill: #E0F2FE; font-size: 14px; font-weight: bold; letter-spacing: 1px; }
    .txt-sub { fill: #7C93A8; font-size: 12px; }
    .box { fill: #04101c; stroke: url(#borderGrad); stroke-width: 1; rx: 12; }
    .box-hover { transition: all 0.3s ease; }
    .box-hover:hover { stroke: #22D3EE; stroke-width: 1.5; filter: url(#glow); }
    .neon-text { fill: #E0F2FE; }
    .chart-path { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: drawChart 3s forwards ease-in-out; }
    @keyframes drawChart { to { stroke-dashoffset: 0; } }
  </style>

  <!-- MOUNTAINS/GLACIER BACKGROUND -->

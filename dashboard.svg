    <circle cx="25" cy="545" r="3" fill="#22D3EE"/><text x="40" y="550" class="t-main txt-sub">Building AI powered automation systems</text>
    <circle cx="25" cy="570" r="3" fill="#22D3EE"/><text x="40" y="575" class="t-main txt-sub">Designing cloud native platforms</text>
    <circle cx="25" cy="595" r="3" fill="#22D3EE"/><text x="40" y="600" class="t-main txt-sub">Kubernetes &amp; GitOps</text>

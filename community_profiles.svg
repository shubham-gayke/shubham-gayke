      <text x="25" y="45" font-size="28">⚡</text>
      <text x="25" y="85" class="card-title">LeetCode</text>
      
      <!-- Status Badge -->
      <rect x="25" y="100" width="70" height="20" rx="4" fill="#38bdf8" fill-opacity="0.15"/>
      <text x="60" y="114" class="mono card-stat" fill="#38bdf8" text-anchor="middle">ACTIVE</text>
      
      <!-- Interactive Arrow -->
      <text x="225" y="115" class="mono" font-size="16" fill="#38bdf8">↗</text>
      
      <!-- Animated Border Glow -->

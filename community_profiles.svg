<svg viewBox="0 0 1200 450" xmlns="http://www.w3.org/2000/svg" role="img">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#081427"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <filter id="softGlow"><feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowDim"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    
    <pattern id="hexGrid" width="40" height="69.282" patternUnits="userSpaceOnUse" patternTransform="scale(0.8)">
      <path d="M 40 17.321 L 20 5.774 L 0 17.321 L 0 40.415 L 20 51.962 L 40 40.415 Z M 40 51.962 L 20 63.509 L 0 51.962 M 20 5.774 L 20 -5.774 M 20 75.056 L 20 63.509 M 40 17.321 L 60 5.774 M 0 17.321 L -20 5.774 M 40 40.415 L 60 51.962 M 0 40.415 L -20 51.962" stroke="#22d3ee" stroke-opacity="0.04" stroke-width="1.5" fill="none"/>
    </pattern>
  </defs>

  <style>
    .mono { font-family: 'JetBrains Mono', Consolas, 'Fira Code', monospace; }
    .heading { font-weight: 800; font-size: 22px; fill: #22d3ee; letter-spacing: 1px; filter: url(#glowDim); }
    .card-bg { fill: #040910; stroke: #1e293b; stroke-width: 1.5; rx: 12; transition: all 0.3s ease; }
    .card-title { font-family: 'Segoe UI', sans-serif; font-weight: 700; font-size: 18px; fill: #ffffff; }
    .card-stat { font-weight: 700; font-size: 11px; letter-spacing: 1px; }
    
    a { cursor: pointer; outline: none; }
    a:hover .card-bg { fill: #0a1322; stroke-width: 2.5; filter: url(#softGlow); }
  </style>

  <!-- Background Layer -->
  <rect width="1200" height="450" fill="url(#bgGrad)" rx="16"/>
  <rect width="1200" height="450" fill="url(#hexGrid)" rx="16"/>
  <rect x="1" y="1" width="1198" height="448" rx="16" fill="none" stroke="#22d3ee" stroke-opacity="0.15"/>
  
  <!-- Glowing Ambient Orbs -->
  <circle cx="200" cy="200" r="150" fill="#38bdf8" opacity="0.05" filter="url(#softGlow)">
    <animate attributeName="opacity" values="0.02;0.08;0.02" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1000" cy="300" r="200" fill="#c084fc" opacity="0.05" filter="url(#softGlow)">
    <animate attributeName="opacity" values="0.02;0.08;0.02" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Header -->
